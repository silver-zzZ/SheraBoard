name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SheraBoard.sln

      - name: Build
        run: dotnet build SheraBoard.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SheraBoard.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"
