name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }
          if (-not $version.StartsWith("v")) {
            $version = "v$version"
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Test
        run: dotnet test SheraBoard.sln --configuration Release

      - name: Publish packages
        shell: pwsh
        run: .\scripts\publish.ps1 -Version "${{ steps.version.outputs.value }}" -Mode all

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.value }}"
          $files = Get-ChildItem -Path artifacts\release -File | ForEach-Object { $_.FullName }
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @files --clobber
          } else {
            gh release create $tag @files --title $tag --generate-notes --target $env:GITHUB_SHA
          }
