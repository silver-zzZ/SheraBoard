name: Bug report
description: Report something that is not working correctly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include sensitive clipboard contents.
  - type: input
    id: version
    attributes:
      label: SheraBoard version
      description: Release version or commit hash.
      placeholder: v0.1.0
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - standalone.exe
        - standalone.zip
        - framework-dependent.zip
        - source build
        - unknown
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Write exact steps.
      placeholder: |
        1. Start SheraBoard
        2. Copy text
        3. Press Ctrl+Alt+V
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, or notes. Remove sensitive data first.
