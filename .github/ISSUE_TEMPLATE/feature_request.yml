name: Feature request
description: Suggest an improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should SheraBoard do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways this could work.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots or examples. Remove sensitive data first.
